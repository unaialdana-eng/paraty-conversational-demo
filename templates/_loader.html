<!-- Page-transition loader — shown instantly on form submit or internal link click.
     Gives visible feedback while Claude + the backend work. Hidden by default;
     included once on every page. -->
<div id="app-loader" aria-hidden="true" style="
  position:fixed;inset:0;z-index:9999;
  background:rgba(15,52,87,0.65);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;
  opacity:0;transition:opacity .2s ease;
  pointer-events:auto;
">
  <div style="
    width:48px;height:48px;border-radius:50%;
    border:4px solid rgba(255,255,255,0.22);
    border-top-color:#fff;
    animation:paraty-spin 0.85s linear infinite;
  "></div>
  <div style="
    color:#fff;font:600 13px/18px 'Montserrat',system-ui,sans-serif;
    letter-spacing:0.12em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  ">
    <span id="app-loader-label">Thinking</span>
    <span id="app-loader-dots" style="display:inline-block;width:18px;text-align:left;">…</span>
  </div>
</div>
<style>
  @keyframes paraty-spin { to { transform: rotate(360deg); } }
</style>
<script>
(function(){
  const loader = document.getElementById('app-loader');
  if (!loader) return;
  const label = document.getElementById('app-loader-label');
  const dots = document.getElementById('app-loader-dots');

  let dotsTimer = null;
  function show(message){
    if (message && label) label.textContent = message;
    loader.style.display = 'flex';
    loader.setAttribute('aria-hidden', 'false');
    // Two-frame delay so the opacity transition kicks in.
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ loader.style.opacity = '1'; });
    });
    // Animate the trailing dots so the user sees progress even if the network is slow.
    let n = 0;
    if (dotsTimer) clearInterval(dotsTimer);
    dotsTimer = setInterval(function(){
      n = (n + 1) % 4;
      if (dots) dots.textContent = '.'.repeat(n);
    }, 400);
  }
  function hide(){
    loader.style.opacity = '0';
    loader.setAttribute('aria-hidden', 'true');
    setTimeout(function(){ loader.style.display = 'none'; }, 200);
    if (dotsTimer) { clearInterval(dotsTimer); dotsTimer = null; }
  }

  function isNavigable(url){
    if (!url) return false;
    try {
      const u = new URL(url, location.href);
      if (u.origin !== location.origin) return false;           // external link
      if (u.hash && u.pathname === location.pathname) return false; // in-page anchor
      if (u.href === location.href) return false;                // same page
      return true;
    } catch(e) { return false; }
  }

  function labelForPath(pathname){
    if (pathname.startsWith('/results')) return 'Finding stays';
    if (pathname.startsWith('/property')) return 'Opening hotel';
    if (pathname.startsWith('/checkout')) return 'Securing rate';
    if (pathname === '/app' || pathname === '/app/') return 'Loading';
    return 'Loading';
  }

  // Any form submit → show loader (every form in this app goes to a Claude-backed page).
  document.addEventListener('submit', function(e){
    const form = e.target;
    const action = form && form.action ? form.action : location.href;
    try {
      const u = new URL(action, location.href);
      show(labelForPath(u.pathname));
    } catch(e) { show('Thinking'); }
  }, true);

  // Any click on an internal link that navigates → show loader.
  document.addEventListener('click', function(e){
    const a = e.target.closest('a');
    if (!a) return;
    if (a.target === '_blank') return;
    if (e.metaKey || e.ctrlKey || e.shiftKey) return;            // new-tab shortcuts
    if (!isNavigable(a.href)) return;
    try {
      const u = new URL(a.href, location.href);
      show(labelForPath(u.pathname));
    } catch(e) { show('Thinking'); }
  }, true);

  // Hide on back/forward cache restore — otherwise the loader stays visible.
  window.addEventListener('pageshow', function(e){ if (e.persisted) hide(); });
})();
</script>
